<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; }
    .container { background: #fff; border-radius: 10px; padding: 30px; max-width: 500px; margin: auto; }
    .header { text-align: center; color: #01338D; }
    .alert { background: #fff8f0; border-left: 4px solid #FFA500; padding: 15px; border-radius: 5px; margin: 20px 0; }
    .footer { text-align: center; color: #7F98C5; font-size: 12px; margin-top: 30px; }
  </style>
</head>
<body>
  <div class="container">
    <h2 class="header">🚇 Metro Mate</h2>
    <p>Dear <strong>{{firstName}}</strong>,</p>
    <div class="alert">
      <strong>⚠️ Subscription Expired</strong>
      <p>Your Metro Mate subscription has expired on <strong>{{expiryDate}}</strong>.</p>
    </div>
    <p>To continue enjoying Metro Mate services, please renew your subscription.</p>
    <p>Thank you for using Metro Mate! 🚇</p>
    <div class="footer">© 2026 Metro Mate. All rights reserved.</div>
  </div>
</body>
</html>
